<!DOCTYPE html>
<html>
<head>
  <title>Clickkart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: linear-gradient(45deg, #ff6a00, #ee0979);
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px;
      width: 220px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .add-btn {
      background: #28a745;
      color: white;
    }

    .add-btn:hover {
      background: #218838;
    }

    .cart {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    @media (max-width:600px){
      .products{flex-direction:column; align-items:center;}
      .card{width:90%;}
    }
  </style>
</head>

<body>

<header>
  <h2>🛒 Clickkart</h2>
  <div>Cart (<span id="cart-count">0</span>)</div>
</header>

<div class="container">

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200x150" />
<h3>Headphones</h3>
<p>₹499</p>
<button class="add-btn" onclick="addToCart('Headphones',499)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x150" />
<h3>Shoes</h3>
<p>₹999</p>
<button class="add-btn" onclick="addToCart('Shoes',999)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>🧾 Cart</h2>
<ul id="cart-items"></ul>
<h3>Total ₹<span id="total">0</span></h3>

<button onclick="checkout()">Checkout</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
  let item = cart.find(i=>i.name===name);

  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }

  updateCart();
}

function updateCart(){
  let list = document.getElementById("cart-items");
  list.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item=>{
    total += item.price * item.qty;
    count += item.qty;

    let li = document.createElement("li");
    li.innerHTML = `
      ${item.name} - ₹${item.price} x ${item.qty}
      <button onclick="changeQty('${item.name}',1)">+</button>
      <button onclick="changeQty('${item.name}',-1)">-</button>
    `;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = count;

  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(name, val){
  let item = cart.find(i=>i.name===name);
  item.qty += val;

  if(item.qty <= 0){
    cart = cart.filter(i=>i.name!==name);
  }

  updateCart();
}

function checkout(){
  if(cart.length===0){
    alert("Cart empty ❌");
    return;
  }

  let confirmOrder = confirm("Proceed to payment?");
  if(confirmOrder){
    alert("Payment Successful 💳✅");
    cart = [];
    updateCart();
  }
}

updateCart();
</script>

</body>
</html>
