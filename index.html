<!DOCTYPE html>
<html>
<head>
  <title>Clickkart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #f1f3f6; }

    header {
      background: #2874f0; color: white; padding: 15px;
      display: flex; justify-content: space-between; flex-wrap: wrap;
    }

    .container { padding: 20px; }

    .products { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

    .card {
      background: white; padding: 15px; width: 220px;
      border-radius: 10px; text-align: center;
    }

    button { margin: 5px; padding: 6px 10px; }

    .cart { background: white; padding: 15px; margin-top: 20px; }

    @media (max-width:600px){
      .products{flex-direction:column; align-items:center;}
      .card{width:90%;}
    }
  </style>
</head>

<body>

<header>
  <h2>Clickkart</h2>
  <div>Cart (<span id="cart-count">0</span>)</div>
</header>

<div class="container">

<div class="products">

<div class="card">
<h3>Headphones</h3>
<p>₹499</p>
<button onclick="addToCart('Headphones',499)">Add</button>
</div>

<div class="card">
<h3>Shoes</h3>
<p>₹999</p>
<button onclick="addToCart('Shoes',999)">Add</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>
<ul id="cart-items"></ul>
<h3>Total ₹<span id="total">0</span></h3>

<button onclick="checkout()">Checkout</button>
</div>

</div>

<script>
let cart = [];

function addToCart(name, price){
  let item = cart.find(i=>i.name===name);

  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }

  updateCart();
}

function updateCart(){
  let list = document.getElementById("cart-items");
  list.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach(item=>{
    total += item.price * item.qty;
    count += item.qty;

    let li = document.createElement("li");
    li.innerHTML = `
      ${item.name} - ₹${item.price} x ${item.qty}
      <button onclick="changeQty('${item.name}',1)">+</button>
      <button onclick="changeQty('${item.name}',-1)">-</button>
    `;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = count;
}

function changeQty(name, val){
  let item = cart.find(i=>i.name===name);
  item.qty += val;

  if(item.qty <= 0){
    cart = cart.filter(i=>i.name!==name);
  }

  updateCart();
}

function checkout(){
  if(cart.length===0){
    alert("Cart empty ❌");
    return;
  }

  let confirmOrder = confirm("Proceed to payment?");
  if(confirmOrder){
    fakePayment();
  }
}

function fakePayment(){
  alert("Payment Successful 💳✅");
  cart = [];
  updateCart();
}
</script>

</body>
</html>
